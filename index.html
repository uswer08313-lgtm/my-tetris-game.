<div class="game-container">
    <canvas id="tetris" width="240" height="400"></canvas>
    <div class="controls">
        <button onclick="isPaused = !isPaused">Pause/Resume</button>
        <button onclick="playerMove(-1)">⬅️</button>
        <button onclick="playerRotate(1)">🔄</button>
        <button onclick="playerMove(1)">➡️</button>
    </div>
</div>
